{% extends "base.html" %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,#1A5276,#2E86C1)">
  <div class="card" style="width:380px;border-radius:16px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div style="width:60px;height:60px;background:#1A5276;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
          <i class="bi bi-credit-card-2-front text-white" style="font-size:1.6rem"></i>
        </div>
        <h4 class="fw-bold" style="color:#1A5276">Payment Order</h4>
        <p class="text-muted small mb-0">Login to your account</p>
      </div>
      {% with messages=get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat,msg in messages %}
      <div class="alert alert-danger py-2 small">{{ msg }}</div>
      {% endfor %}{% endif %}{% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Login</button>
      </form>
      <p class="text-muted text-center mt-3 small">Default: admin / admin123</p>
    </div>
  </div>
</div>
{% endblock %}
